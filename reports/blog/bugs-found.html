<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 40px;
      background: #ffffff;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 720px;
      font-size: 14px;
      line-height: 1.5;
      color: #24292e;
    }
    th {
      background: #f6f8fa;
      font-weight: 600;
      text-align: left;
      padding: 12px 16px;
      border-bottom: 2px solid #d0d7de;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #57606a;
    }
    td {
      padding: 11px 16px;
      border-bottom: 1px solid #e8eaed;
    }
    th:first-child, td:first-child { padding-left: 16px; }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) { background: #f8f9fa; }
    .model { font-weight: 600; white-space: nowrap; }
    .val { text-align: center; font-family: "SF Mono", "Cascadia Code", "Consolas", monospace; font-size: 13px; }
  </style>
</head>
<body>
  <table>
    <thead>
      <tr>
        <th>Model</th>
        <th style="text-align:center">Original Bugs</th>
        <th style="text-align:center">Extra Bugs</th>
        <th style="text-align:center">Claimed</th>
        <th style="text-align:center">Honest Score</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="model">Hawiyat Composer (max)</td>
        <td class="val">16/20 (80%)</td>
        <td class="val">1 (build error)</td>
        <td class="val">20</td>
        <td class="val">16/20 + 1 extra</td>
      </tr>
      <tr>
        <td class="model">Claude Opus 4.8 (high)</td>
        <td class="val">17/20 (85%)</td>
        <td class="val">2</td>
        <td class="val">19</td>
        <td class="val">17/20 + 2 extras</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
