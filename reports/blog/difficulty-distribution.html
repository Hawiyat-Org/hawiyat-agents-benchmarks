<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 40px;
      background: #ffffff;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 680px;
      font-size: 14px;
      line-height: 1.5;
      color: #24292e;
    }
    th {
      background: #f6f8fa;
      font-weight: 600;
      text-align: left;
      padding: 12px 16px;
      border-bottom: 2px solid #d0d7de;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #57606a;
    }
    td {
      padding: 11px 16px;
      border-bottom: 1px solid #e8eaed;
    }
    th:first-child, td:first-child { padding-left: 16px; }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) { background: #f8f9fa; }
    .difficulty { font-weight: 600; white-space: nowrap; }
    .count { text-align: center; font-family: "SF Mono", "Cascadia Code", "Consolas", monospace; font-size: 13px; }
    .examples { font-size: 13px; color: #57606a; }
  </style>
</head>
<body>
  <table>
    <thead>
      <tr>
        <th>Difficulty</th>
        <th style="text-align:center">Count</th>
        <th>Examples</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="difficulty">Easy</td>
        <td class="count">5</td>
        <td class="examples">Missing await, wrong HTTP status, staleTime/gcTime confusion, middleware ordering</td>
      </tr>
      <tr>
        <td class="difficulty">Medium</td>
        <td class="count">7</td>
        <td class="examples">N+1 queries, missing transactions, race conditions, invalidation bugs</td>
      </tr>
      <tr>
        <td class="difficulty">Hard</td>
        <td class="count">8</td>
        <td class="examples">Connection pool exhaustion, TOCTOU races, unhandled promise rejections, pagination logic errors</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
